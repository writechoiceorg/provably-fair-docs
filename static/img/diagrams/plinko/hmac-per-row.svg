<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 740 218" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&amp;family=DM+Sans:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap');
  </style>
      <defs>
        <filter id="sh_s2" x="-4%" y="-6%" width="108%" height="120%">
          <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#000" flood-opacity=".06"/>
        </filter>
      </defs>
      <rect width="740" height="218" fill="#f6f7f9"/>

      <!-- Title -->
      <text x="370" y="22" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="10" font-weight="700" fill="#aaa" letter-spacing=".08em">PLINKO HMAC-SHA256 PIPELINE (PER ROW)</text>


      <!-- Step 1: Inputs -->
      <text x="72" y="44" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="8" font-weight="700" fill="#e8590c" letter-spacing=".06em" opacity=".7">STEP 1</text>
      <g filter="url(#sh_s2)">
        <rect x="14" y="50" width="116" height="60" rx="8" fill="#fff" stroke="#e5e5ea" stroke-width="1"/>
        <!-- code bracket icon - orange -->
        <svg x="26" y="59" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#e8590c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4,1 L1,7 L4,13"/>
          <path d="M10,1 L13,7 L10,13"/>
        </svg>
        <text x="44" y="72" font-family="DM Sans,sans-serif" font-size="11" font-weight="700" fill="#2a2a2e">Inputs</text>
        <text x="26" y="94" font-family="JetBrains Mono,monospace" font-size="7.5" fill="#aaa">seed:seed:nonce:row</text>
      </g>

      <!-- Arrow -->
      <line x1="132" y1="80" x2="148" y2="80" stroke="#e5e5ea" stroke-width="1.5"/>
      <polygon points="146,76 152,80 146,84" fill="#e5e5ea"/>

      <!-- Step 2: HMAC-SHA256 (dark) -->
      <text x="220" y="44" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="8" font-weight="700" fill="#e8590c" letter-spacing=".06em" opacity=".7">STEP 2</text>
      <g filter="url(#sh_s2)">
        <rect x="154" y="50" width="132" height="60" rx="8" fill="#0e0e14"/>
        <!-- shield icon -->
        <svg x="166" y="58" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7,1 L12,3 V7 C12,10 9.5,12 7,13 C4.5,12 2,10 2,7 V3 Z"/>
        </svg>
        <text x="184" y="72" font-family="JetBrains Mono,monospace" font-size="10.5" font-weight="600" fill="rgba(255,255,255,.88)">HMAC-SHA256</text>
        <text x="166" y="94" font-family="DM Sans,sans-serif" font-size="8" fill="rgba(255,255,255,.3)">cryptographic hash</text>
      </g>

      <!-- Arrow -->
      <line x1="288" y1="80" x2="304" y2="80" stroke="#e5e5ea" stroke-width="1.5"/>
      <polygon points="302,76 308,80 302,84" fill="#e5e5ea"/>

      <!-- Step 3: Hash → Number -->
      <text x="370" y="44" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="8" font-weight="700" fill="#e8590c" letter-spacing=".06em" opacity=".7">STEP 3</text>
      <g filter="url(#sh_s2)">
        <rect x="310" y="50" width="120" height="60" rx="8" fill="#fff" stroke="#e5e5ea" stroke-width="1"/>
        <!-- hash to number icon - purple -->
        <svg x="322" y="59" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round">
          <line x1="3" y1="0.5" x2="1.5" y2="13.5"/>
          <line x1="9" y1="0.5" x2="7.5" y2="13.5"/>
          <line x1="0" y1="4.5" x2="12" y2="4.5"/>
          <line x1="2" y1="9.5" x2="14" y2="9.5"/>
        </svg>
        <text x="340" y="72" font-family="DM Sans,sans-serif" font-size="11" font-weight="700" fill="#2a2a2e">Hash → Number</text>
        <text x="322" y="94" font-family="JetBrains Mono,monospace" font-size="7.5" fill="#aaa">4 bytes → uint32</text>
      </g>

      <!-- Arrow -->
      <line x1="432" y1="80" x2="448" y2="80" stroke="#e5e5ea" stroke-width="1.5"/>
      <polygon points="446,76 452,80 446,84" fill="#e5e5ea"/>

      <!-- Step 4: Left or Right -->
      <text x="514" y="44" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="8" font-weight="700" fill="#e8590c" letter-spacing=".06em" opacity=".7">STEP 4</text>
      <g filter="url(#sh_s2)">
        <rect x="454" y="50" width="120" height="60" rx="8" fill="#fff" stroke="#e5e5ea" stroke-width="1"/>
        <!-- split arrows icon - blue -->
        <svg x="466" y="58" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7,2 V6"/>
          <path d="M7,6 L3,11"/>
          <path d="M7,6 L11,11"/>
          <circle cx="3" cy="12" r="1" fill="#2563eb" stroke="none" opacity=".4"/>
          <circle cx="11" cy="12" r="1" fill="#2563eb" stroke="none" opacity=".4"/>
        </svg>
        <text x="484" y="72" font-family="DM Sans,sans-serif" font-size="11" font-weight="700" fill="#2a2a2e">Left or Right</text>
        <text x="466" y="94" font-family="JetBrains Mono,monospace" font-size="7.5" fill="#aaa">mod 2 → L or R</text>
      </g>

      <!-- Arrow -->
      <line x1="576" y1="80" x2="592" y2="80" stroke="#e5e5ea" stroke-width="1.5"/>
      <polygon points="590,76 596,80 590,84" fill="#e5e5ea"/>

      <!-- Step 5: Slot Mapping (green) -->
      <text x="662" y="44" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="8" font-weight="700" fill="#16a34a" letter-spacing=".06em" opacity=".7">STEP 5</text>
      <g filter="url(#sh_s2)">
        <rect x="598" y="50" width="128" height="60" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
        <!-- triangle dot grid icon -->
        <svg x="610" y="56" width="14" height="16" viewBox="0 0 14 16" fill="none">
          <circle cx="7" cy="2" r="1.5" fill="#22c55e"/>
          <circle cx="4.5" cy="7" r="1.5" fill="#16a34a" opacity=".5"/>
          <circle cx="9.5" cy="7" r="1.5" fill="#16a34a" opacity=".5"/>
          <circle cx="2" cy="12" r="1.5" fill="#16a34a" opacity=".3"/>
          <circle cx="7" cy="12" r="1.5" fill="#16a34a" opacity=".3"/>
          <circle cx="12" cy="12" r="1.5" fill="#16a34a" opacity=".3"/>
        </svg>
        <text x="628" y="72" font-family="DM Sans,sans-serif" font-size="11" font-weight="700" fill="#16a34a">Slot Mapping</text>
        <text x="610" y="94" font-family="JetBrains Mono,monospace" font-size="7.5" fill="#16a34a">Σ rights → slot</text>
      </g>


      <!-- Verification strip -->
      <g filter="url(#sh_s2)">
        <rect x="14" y="130" width="712" height="44" rx="8" fill="#fff" stroke="#e5e5ea" stroke-width="1"/>
        <circle cx="40" cy="152" r="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
        <polyline points="35,152 38,155 45,147" fill="none" stroke="#16a34a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="58" y="148" font-family="Plus Jakarta Sans,sans-serif" font-size="10" font-weight="700" fill="#2a2a2e">Final Verification</text>
        <text x="58" y="162" font-family="DM Sans,sans-serif" font-size="9.5" fill="#aaa">Live output: slot 7  ·  Verifier output: slot 7  ·  </text>
        <text x="338" y="162" font-family="Plus Jakarta Sans,sans-serif" font-size="9.5" font-weight="700" fill="#16a34a">Perfect Match</text>
      </g>

      <!-- Bottom note -->
      <text x="370" y="202" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9.5" fill="#aaa">Repeated for each row (cursor 0 to rows−1). Same inputs → same ball path. Always.</text>

</svg>
