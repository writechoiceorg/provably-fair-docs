<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 580 560" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&amp;family=DM+Sans:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap');
  </style>
      <defs>
        <filter id="sh_s3" x="-4%" y="-6%" width="108%" height="120%">
          <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#000" flood-opacity=".06"/>
        </filter>
      </defs>
      <rect width="580" height="560" fill="#f6f7f9"/>

      <!-- Title -->
      <text x="290" y="22" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="10" font-weight="700" fill="#aaa" letter-spacing=".08em">VERIFICATION FLOW</text>

      <!-- Seed pills row -->
      <g filter="url(#sh_s3)">
        <rect x="148" y="36" width="84" height="26" rx="6" fill="#fff" stroke="#e5e5ea"/>
        <text x="190" y="53" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" fill="#2a2a2e">Server Seed</text>
      </g>
      <g filter="url(#sh_s3)">
        <rect x="240" y="36" width="78" height="26" rx="6" fill="#fff" stroke="#e5e5ea"/>
        <text x="279" y="53" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" fill="#2a2a2e">Client Seed</text>
      </g>
      <g filter="url(#sh_s3)">
        <rect x="326" y="36" width="86" height="26" rx="6" fill="#fff" stroke="#e5e5ea"/>
        <text x="369" y="53" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" fill="#2a2a2e">Nonce+Rows</text>
      </g>

      <!-- Arrow down -->
      <line x1="290" y1="64" x2="290" y2="80" stroke="#d4d4da" stroke-width="1.5"/>
      <polygon points="286,78 290,86 294,78" fill="#d4d4da"/>

      <!-- Split into two columns -->
      <!-- Left: Live Game RNG (dark) -->
      <g filter="url(#sh_s3)">
        <rect x="68" y="92" width="150" height="32" rx="7" fill="#0e0e14"/>
        <text x="143" y="112" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,.9)">Live Game RNG</text>
      </g>

      <!-- VS label -->
      <text x="290" y="116" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="14" font-weight="800" fill="#e8590c">VS</text>

      <!-- Right: Independent Verifier (accent border) -->
      <g filter="url(#sh_s3)">
        <rect x="362" y="92" width="150" height="32" rx="7" fill="#fff" stroke="#e8590c" stroke-width="1.5"/>
        <text x="437" y="112" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="#e8590c">Our Verifier</text>
      </g>

      <!-- Left arrow down -->
      <line x1="143" y1="124" x2="143" y2="140" stroke="#d4d4da" stroke-width="1.3"/>
      <polygon points="139,138 143,146 147,138" fill="#d4d4da"/>

      <!-- Right arrow down -->
      <line x1="437" y1="124" x2="437" y2="140" stroke="#d4d4da" stroke-width="1.3"/>
      <polygon points="433,138 437,146 441,138" fill="#d4d4da"/>

      <!-- Left result (dark pill) -->
      <rect x="88" y="150" width="110" height="28" rx="6" fill="#0e0e14"/>
      <text x="143" y="168" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10" fill="rgba(255,255,255,.85)">Slot: </text>
      <text x="168" y="168" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700" fill="rgba(255,255,255,.95)">7</text>

      <!-- Right result (white pill) -->
      <g filter="url(#sh_s3)">
        <rect x="382" y="150" width="110" height="28" rx="6" fill="#fff" stroke="#e5e5ea"/>
        <text x="437" y="168" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10" fill="#2a2a2e">Slot: </text>
        <text x="462" y="168" font-family="JetBrains Mono,monospace" font-size="10" font-weight="700" fill="#2a2a2e">7</text>
      </g>

      <!-- Arrow down to parity -->
      <line x1="290" y1="180" x2="290" y2="200" stroke="#d4d4da" stroke-width="1.5"/>
      <polygon points="286,198 290,206 294,198" fill="#d4d4da"/>

      <!-- Parity banner (green) -->
      <rect x="130" y="210" width="320" height="34" rx="8" fill="#16a34a"/>
      <!-- check icon -->
      <svg x="164" y="217" width="18" height="18" viewBox="0 0 16 16" fill="none">
        <rect width="16" height="16" rx="3" fill="rgba(255,255,255,.25)"/>
        <polyline points="4,8.5 7,11.5 12,5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <text x="306" y="232" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="11" font-weight="700" fill="#fff" letter-spacing=".04em">100% PARITY = TRUSTED</text>


      <!-- ══════ WITH / WITHOUT panels ══════ -->

      <!-- WITH 100% Parity (green) -->
      <rect x="20" y="264" width="260" height="148" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
      <rect x="20" y="264" width="260" height="24" rx="8" fill="#16a34a"/>
      <rect x="20" y="278" width="260" height="10" fill="#16a34a"/>
      <svg x="30" y="268" width="14" height="14" viewBox="0 0 16 16" fill="none">
        <rect width="16" height="16" rx="3" fill="rgba(255,255,255,.3)"/>
        <polyline points="4,8.5 7,11.5 12,5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <text x="50" y="281" font-family="Plus Jakarta Sans,sans-serif" font-size="9" font-weight="700" fill="#fff" letter-spacing=".04em">WITH 100% Parity</text>

      <circle cx="40" cy="306" r="3" fill="#16a34a"/>
      <text x="50" y="310" font-family="DM Sans,sans-serif" font-size="9.5" fill="#2a2a2e">Players can verify every slot outcome</text>

      <circle cx="40" cy="326" r="3" fill="#16a34a"/>
      <text x="50" y="330" font-family="DM Sans,sans-serif" font-size="9.5" fill="#2a2a2e">Cryptographic proof of fairness</text>

      <circle cx="40" cy="346" r="3" fill="#16a34a"/>
      <text x="50" y="350" font-family="DM Sans,sans-serif" font-size="9.5" fill="#2a2a2e">Casino cannot manipulate results</text>

      <circle cx="40" cy="366" r="3" fill="#16a34a"/>
      <text x="50" y="370" font-family="DM Sans,sans-serif" font-size="9.5" fill="#2a2a2e">Complete trust established</text>

      <circle cx="40" cy="386" r="3" fill="#16a34a"/>
      <text x="50" y="390" font-family="DM Sans,sans-serif" font-size="9.5" fill="#2a2a2e">7,600/7,600 bets confirmed</text>


      <!-- WITHOUT Parity (red) -->
      <rect x="300" y="264" width="260" height="148" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
      <rect x="300" y="264" width="260" height="24" rx="8" fill="#dc2626"/>
      <rect x="300" y="278" width="260" height="10" fill="#dc2626"/>
      <svg x="310" y="268" width="14" height="14" viewBox="0 0 16 16" fill="none">
        <rect width="16" height="16" rx="3" fill="rgba(255,255,255,.3)"/>
        <line x1="4.5" y1="4.5" x2="11.5" y2="11.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        <line x1="11.5" y1="4.5" x2="4.5" y2="11.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <text x="330" y="281" font-family="Plus Jakarta Sans,sans-serif" font-size="9" font-weight="700" fill="#fff" letter-spacing=".04em">WITHOUT Parity</text>

      <circle cx="320" cy="306" r="3" fill="#dc2626"/>
      <text x="330" y="310" font-family="DM Sans,sans-serif" font-size="9.5" fill="#2a2a2e">Verification becomes meaningless</text>

      <circle cx="320" cy="326" r="3" fill="#dc2626"/>
      <text x="330" y="330" font-family="DM Sans,sans-serif" font-size="9.5" fill="#2a2a2e">Possible manipulation detected</text>

      <circle cx="320" cy="346" r="3" fill="#dc2626"/>
      <text x="330" y="350" font-family="DM Sans,sans-serif" font-size="9.5" fill="#2a2a2e">Bug in RNG implementation</text>

      <circle cx="320" cy="366" r="3" fill="#dc2626"/>
      <text x="330" y="370" font-family="DM Sans,sans-serif" font-size="9.5" fill="#2a2a2e">Zero player trust</text>


      <!-- ══════ KEY PRINCIPLE ══════ -->
      <rect x="60" y="428" width="460" height="34" rx="7" fill="#fff" stroke="#e5e5ea"/>
      <text x="290" y="449" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="#52525e"><tspan font-weight="700" fill="#e8590c">Key Principle:</tspan> Same inputs must <tspan font-weight="800">ALWAYS</tspan> produce same outputs — no exceptions.</text>


      <!-- ══════ PASS BANNER ══════ -->
      <rect x="20" y="478" width="540" height="28" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
      <svg x="30" y="483" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect width="16" height="16" rx="3" fill="#16a34a"/>
        <polyline points="4,8.5 7,11.5 12,5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <text x="52" y="497" font-family="Plus Jakarta Sans,sans-serif" font-size="8.5" font-weight="700" fill="#16a34a" letter-spacing=".04em">ALL 7,600 PLINKO BETS VERIFIED — 100% PARITY WITH computeSlot()</text>

      <!-- Bottom note -->
      <text x="290" y="534" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="#aaa">Every live final_slot exactly matched our independent recomputation.</text>
      <text x="290" y="548" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="#aaa">The Plinko RNG is provably fair.</text>

</svg>
