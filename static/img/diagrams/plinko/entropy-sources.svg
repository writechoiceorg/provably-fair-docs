<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&amp;family=DM+Sans:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap');
  </style>
      <defs>
        <filter id="sh_s2" x="-4%" y="-6%" width="108%" height="120%">
          <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#000" flood-opacity=".06"/>
        </filter>
        <pattern id="dots_s2" width="6" height="6" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r=".3" fill="#000" opacity=".02"/>
        </pattern>
      </defs>
      <rect width="700" height="440" fill="#f6f7f9"/>

      <!-- Title -->
      <text x="350" y="22" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="10" font-weight="700" fill="#aaa" letter-spacing=".08em">NO MIXED ENTROPY SOURCES</text>


      <!-- ══════ LEFT: VALID PURE ENTROPY ══════ -->
      <rect x="20" y="38" width="318" height="228" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
      <rect x="20" y="38" width="318" height="26" rx="10" fill="#16a34a"/>
      <rect x="20" y="54" width="318" height="10" fill="#16a34a"/>
      <!-- checkmark -->
      <svg x="30" y="42" width="14" height="14" viewBox="0 0 16 16" fill="none">
        <rect width="16" height="16" rx="3" fill="rgba(255,255,255,.25)"/>
        <polyline points="4,8.5 7,11.5 12,5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <text x="50" y="55" font-family="Plus Jakarta Sans,sans-serif" font-size="8.5" font-weight="700" fill="#fff" letter-spacing=".06em">VALID: PURE ENTROPY</text>

      <!-- 3 seed boxes -->
      <g filter="url(#sh_s2)">
        <rect x="52" y="82" width="82" height="30" rx="6" fill="#fff" stroke="#e5e5ea"/>
        <text x="93" y="102" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#2a2a2e">serverSeed</text>
      </g>
      <g filter="url(#sh_s2)">
        <rect x="140" y="82" width="78" height="30" rx="6" fill="#fff" stroke="#e5e5ea"/>
        <text x="179" y="102" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#2a2a2e">clientSeed</text>
      </g>
      <g filter="url(#sh_s2)">
        <rect x="224" y="82" width="82" height="30" rx="6" fill="#fff" stroke="#e5e5ea"/>
        <text x="265" y="102" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#2a2a2e">nonce:row</text>
      </g>

      <!-- Arrow down -->
      <text x="179" y="128" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="13" fill="#bbf7d0">↓</text>

      <!-- HMAC box -->
      <g filter="url(#sh_s2)">
        <rect x="114" y="134" width="130" height="30" rx="6" fill="#fff" stroke="#e5e5ea"/>
        <text x="179" y="154" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9.5" font-weight="600" fill="#2a2a2e">HMAC-SHA256</text>
      </g>

      <!-- Arrow down -->
      <text x="179" y="182" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="13" fill="#bbf7d0">↓</text>

      <!-- Result (green pill) -->
      <rect x="144" y="188" width="70" height="28" rx="14" fill="#16a34a"/>
      <text x="179" y="207" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10.5" font-weight="700" fill="#fff">Slot 7</text>

      <!-- Labels -->
      <text x="179" y="236" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="#16a34a">Same inputs → Same slot</text>
      <text x="179" y="250" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="#16a34a">100% deterministic &amp; verifiable</text>


      <!-- ══════ RIGHT: INVALID MIXED ENTROPY ══════ -->
      <rect x="362" y="38" width="318" height="228" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
      <rect x="362" y="38" width="318" height="26" rx="10" fill="#dc2626"/>
      <rect x="362" y="54" width="318" height="10" fill="#dc2626"/>
      <!-- x icon -->
      <svg x="372" y="42" width="14" height="14" viewBox="0 0 16 16" fill="none">
        <rect width="16" height="16" rx="3" fill="rgba(255,255,255,.25)"/>
        <line x1="5" y1="5" x2="11" y2="11" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        <line x1="11" y1="5" x2="5" y2="11" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <text x="392" y="55" font-family="Plus Jakarta Sans,sans-serif" font-size="8.5" font-weight="700" fill="#fff" letter-spacing=".06em">INVALID: MIXED ENTROPY</text>

      <!-- 3 seed boxes + dashed extra -->
      <g filter="url(#sh_s2)">
        <rect x="382" y="82" width="72" height="30" rx="6" fill="#fff" stroke="#e5e5ea"/>
        <text x="418" y="102" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#2a2a2e">serverSeed</text>
      </g>
      <g filter="url(#sh_s2)">
        <rect x="460" y="82" width="66" height="30" rx="6" fill="#fff" stroke="#e5e5ea"/>
        <text x="493" y="102" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#2a2a2e">clientSeed</text>
      </g>
      <g filter="url(#sh_s2)">
        <rect x="532" y="82" width="50" height="30" rx="6" fill="#fff" stroke="#e5e5ea"/>
        <text x="557" y="102" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#2a2a2e">nonce</text>
      </g>
      <!-- dashed forbidden source -->
      <rect x="588" y="82" width="80" height="30" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,2"/>
      <text x="628" y="101" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="7.5" fill="#dc2626">+ Math.random()</text>

      <!-- Arrow down -->
      <text x="521" y="128" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="13" fill="#fecaca">↓</text>

      <!-- HMAC box (with ???) -->
      <g filter="url(#sh_s2)">
        <rect x="446" y="134" width="150" height="30" rx="6" fill="#fff" stroke="#fecaca"/>
        <text x="521" y="154" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9.5" font-weight="600" fill="#2a2a2e">HMAC-SHA256 + ???</text>
      </g>

      <!-- Arrow down -->
      <text x="521" y="182" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="13" fill="#fecaca">↓</text>

      <!-- Result (red pill) -->
      <rect x="481" y="188" width="80" height="28" rx="14" fill="#dc2626"/>
      <text x="521" y="207" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10.5" font-weight="700" fill="#fff">Slot ???</text>

      <!-- Labels -->
      <text x="521" y="236" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="#dc2626">Same inputs → Different slots</text>
      <text x="521" y="250" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="#dc2626">Non-deterministic &amp; unverifiable</text>


      <!-- ══════ FORBIDDEN SOURCES ══════ -->
      <rect x="20" y="282" width="660" height="54" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
      <!-- warning icon -->
      <svg x="30" y="290" width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M8,1 L15,14 H1 Z" fill="#f59e0b" stroke="none"/>
        <text x="8" y="12.5" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="9" font-weight="800" fill="#fff">!</text>
      </svg>
      <text x="50" y="301" font-family="Plus Jakarta Sans,sans-serif" font-size="8" font-weight="700" fill="#92400e" letter-spacing=".04em">FORBIDDEN EXTERNAL ENTROPY SOURCES</text>

      <!-- Tags -->
      <rect x="36" y="310" width="88" height="20" rx="4" fill="#fff" stroke="#fde68a"/>
      <text x="80" y="324" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8" fill="#92400e">Math.random()</text>

      <rect x="132" y="310" width="72" height="20" rx="4" fill="#fff" stroke="#fde68a"/>
      <text x="168" y="324" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8" fill="#92400e">Date.now()</text>

      <rect x="212" y="310" width="92" height="20" rx="4" fill="#fff" stroke="#fde68a"/>
      <text x="258" y="324" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8" fill="#92400e">crypto.random()</text>

      <rect x="312" y="310" width="104" height="20" rx="4" fill="#fff" stroke="#fde68a"/>
      <text x="364" y="324" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8" fill="#92400e">process.hrtime()</text>

      <rect x="424" y="310" width="84" height="20" rx="4" fill="#fff" stroke="#fde68a"/>
      <text x="466" y="324" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8" fill="#92400e">External APIs</text>

      <rect x="516" y="310" width="120" height="20" rx="4" fill="#fff" stroke="#fde68a"/>
      <text x="576" y="324" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8" fill="#92400e">Database timestamps</text>


      <!-- ══════ HOW DETECTED ══════ -->
      <rect x="20" y="350" width="660" height="42" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
      <svg x="30" y="358" width="14" height="14" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="7" fill="#2563eb"/>
        <text x="8" y="12" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="10" font-weight="800" fill="#fff">?</text>
      </svg>
      <text x="50" y="369" font-family="Plus Jakarta Sans,sans-serif" font-size="7.5" font-weight="700" fill="#1e40af" letter-spacing=".02em">HOW MIXED ENTROPY IS DETECTED</text>
      <text x="50" y="384" font-family="DM Sans,sans-serif" font-size="9" fill="#64748b" font-style="italic">Run the same inputs multiple times. If results ever differ, external entropy has been mixed in. Pure HMAC-SHA256 must always produce identical outputs.</text>


      <!-- ══════ PASS BANNER ══════ -->
      <rect x="20" y="404" width="660" height="24" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
      <svg x="30" y="407" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect width="16" height="16" rx="3" fill="#16a34a"/>
        <polyline points="4,8.5 7,11.5 12,5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <text x="52" y="421" font-family="Plus Jakarta Sans,sans-serif" font-size="8.5" font-weight="700" fill="#16a34a" letter-spacing=".04em">NO MIXED ENTROPY SOURCES DETECTED</text>

</svg>
