        <text x="360" y="228" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="7" font-weight="700" fill="#aaa" letter-spacing=".04em">MULTIPLIER (STEP 8)</text>
        <text x="360" y="248" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="16" font-weight="800" fill="#e8590c">10.085×</text>
        <text x="360" y="260" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="7.5" fill="#aaa">scaling_edge[0] matched</text>
      </g>

      <!-- Arrow -->
      <text x="457" y="246" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="14" font-weight="800" fill="#d4d4da">→</text>

      <!-- Box 3: Win -->
      <g filter="url(#sh_s4)">
        <rect x="485" y="210" width="140" height="56" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
        <text x="555" y="228" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="7" font-weight="700" fill="#16a34a" letter-spacing=".04em">WIN AMOUNT (STEP 7)</text>
        <text x="555" y="248" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="16" font-weight="800" fill="#16a34a">$0.1009</text>
        <text x="555" y="260" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="7.5" fill="#16a34a">$0.01 × 10.085 ✓</text>
      </g>


      <!-- ══════════════════════════════════════════════ -->
      <!-- AUDIT EVIDENCE — 3 verification steps           -->
      <!-- ══════════════════════════════════════════════ -->

      <rect x="65" y="300" width="590" height="68" rx="8" fill="#fff" stroke="#e5e5ea"/>
      <circle cx="79" cy="316" r="5" fill="#2563eb"/>
      <text x="91" y="320" font-family="Plus Jakarta Sans,sans-serif" font-size="8" font-weight="700" fill="#2a2a2e" letter-spacing=".04em">EACH STEP INDEPENDENTLY VERIFIED ACROSS ALL 7,600 BETS</text>

      <!-- Step 5 -->
      <rect x="85" y="332" width="170" height="24" rx="4" fill="#f6f7f9" stroke="#e5e5ea"/>
      <svg x="91" y="337" width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <text x="107" y="349" font-family="DM Sans,sans-serif" font-size="8.5" fill="#2a2a2e"><tspan font-weight="600">Step 5:</tspan> Slot recomputed</text>

      <!-- Step 8 -->
      <rect x="275" y="332" width="170" height="24" rx="4" fill="#f6f7f9" stroke="#e5e5ea"/>
      <svg x="281" y="337" width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <text x="297" y="349" font-family="DM Sans,sans-serif" font-size="8.5" fill="#2a2a2e"><tspan font-weight="600">Step 8:</tspan> Multiplier matched</text>

      <!-- Step 7 -->
      <rect x="465" y="332" width="170" height="24" rx="4" fill="#f6f7f9" stroke="#e5e5ea"/>
      <svg x="471" y="337" width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <text x="487" y="349" font-family="DM Sans,sans-serif" font-size="8.5" fill="#2a2a2e"><tspan font-weight="600">Step 7:</tspan> Payout correct</text>


      <!-- ══════════════════════════════════════════════ -->
      <!-- PASS BANNER — centered at 360                   -->
      <!-- ══════════════════════════════════════════════ -->

      <rect x="65" y="384" width="590" height="28" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
      <svg x="77" y="389" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect width="16" height="16" rx="3" fill="#16a34a"/>
        <polyline points="4,8.5 7,11.5 12,5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <text x="99" y="403" font-family="Plus Jakarta Sans,sans-serif" font-size="8.5" font-weight="700" fill="#16a34a" letter-spacing=".04em">7,600 / 7,600 BETS: SLOT CORRECT, MULTIPLIER MATCHED, PAYOUT VERIFIED</text>

      <!-- WHY IT MATTERS note -->
      <text x="360" y="430" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="#aaa">Casino cannot alter any step after the slot is determined. Every payout is deterministic and verifiable.</text>

</svg>
