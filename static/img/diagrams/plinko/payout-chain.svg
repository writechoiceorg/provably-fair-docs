        <text x="165" y="260" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="7.5" fill="#aaa">computeSlot() verified</text>
      </g>

      <!-- Multiply sign -->
      <text x="262" y="246" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="14" font-weight="800" fill="#d4d4da">→</text>

      <!-- Box 2: Multiplier -->
