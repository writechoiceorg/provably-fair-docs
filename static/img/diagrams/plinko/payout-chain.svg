<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&amp;family=DM+Sans:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap');
  </style>
      <defs>
        <filter id="sh_s4" x="-4%" y="-6%" width="108%" height="120%">
          <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#000" flood-opacity=".07"/>
        </filter>
        <pattern id="dots_s4" width="6" height="6" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r=".3" fill="#000" opacity=".02"/>
        </pattern>
      </defs>
      <rect width="720" height="440" fill="#f6f7f9"/>

      <!-- Title -->
      <text x="360" y="24" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="10" font-weight="700" fill="#aaa" letter-spacing=".08em">PAYOUT CHAIN — FROM SLOT TO WIN AMOUNT</text>


      <!-- ══════════════════════════════════════════════ -->
      <!-- THREE-STEP PIPELINE                             -->
      <!-- Step widths=186, gaps=16, total=590, margin=65  -->
      <!-- Step 1: x=65..251   center=158                 -->
      <!-- Step 2: x=267..453  center=360                 -->
      <!-- Step 3: x=469..655  center=562                 -->
      <!-- ══════════════════════════════════════════════ -->

      <!-- ── STEP 1: Slot Determination ── -->
      <text x="158" y="48" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="8" font-weight="700" fill="#e8590c" letter-spacing=".08em" opacity=".7">STEP 1</text>

      <line x1="158" y1="53" x2="158" y2="62" stroke="#d4d4da" stroke-width="1.2"/>
      <polygon points="154.5,60 158,67 161.5,60" fill="#d4d4da"/>

      <g filter="url(#sh_s4)">
        <rect x="65" y="70" width="186" height="82" rx="8" fill="#fff" stroke="#e5e5ea"/>
        <text x="158" y="92" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11.5" font-weight="700" fill="#2a2a2e">Slot Determination</text>
        <text x="158" y="108" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#aaa">computeSlot(server, client,</text>
        <text x="158" y="120" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#aaa">nonce, rows)</text>
        <!-- Result pill -->
        <rect x="118" y="130" width="80" height="16" rx="8" fill="#0e0e14"/>
        <text x="158" y="142" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" fill="rgba(255,255,255,.9)">slot = 9</text>
      </g>

      <!-- Arrow → -->
      <line x1="253" y1="111" x2="265" y2="111" stroke="#d4d4da" stroke-width="1.5"/>
      <polygon points="263,107.5 269,111 263,114.5" fill="#d4d4da"/>


      <!-- ── STEP 2: Multiplier Lookup ── -->
      <text x="360" y="48" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="8" font-weight="700" fill="#e8590c" letter-spacing=".08em" opacity=".7">STEP 2</text>

      <line x1="360" y1="53" x2="360" y2="62" stroke="#d4d4da" stroke-width="1.2"/>
      <polygon points="356.5,60 360,67 363.5,60" fill="#d4d4da"/>

