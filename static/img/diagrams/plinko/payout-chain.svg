        <text x="360" y="92" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11.5" font-weight="700" fill="#2a2a2e">Multiplier Lookup</text>
        <text x="360" y="108" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#aaa">scaling_edge[0]</text>
        <text x="360" y="120" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#aaa">10r / high / slot 9</text>
        <!-- Result pill -->
        <rect x="301" y="130" width="118" height="16" rx="8" fill="#0e0e14"/>
        <text x="360" y="142" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" fill="rgba(255,255,255,.9)">mult = 10.0845×</text>
      </g>

      <!-- Arrow → -->
      <line x1="455" y1="111" x2="467" y2="111" stroke="#d4d4da" stroke-width="1.5"/>
      <polygon points="465,107.5 471,111 465,114.5" fill="#d4d4da"/>


      <!-- ── STEP 3: Payout Calculation ── -->
      <text x="562" y="48" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="8" font-weight="700" fill="#16a34a" letter-spacing=".08em" opacity=".7">STEP 3</text>

      <line x1="562" y1="53" x2="562" y2="62" stroke="#bbf7d0" stroke-width="1.2"/>
      <polygon points="558.5,60 562,67 565.5,60" fill="#bbf7d0"/>

      <g filter="url(#sh_s4)">
