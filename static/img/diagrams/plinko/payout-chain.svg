      <text x="360" y="196" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="8" font-weight="700" fill="#aaa" letter-spacing=".06em">REAL BET VERIFIED — ID 59904017 (PHASE A, 10 ROWS, HIGH RISK)</text>

      <!-- Three value boxes in a row -->
      <!-- Box 1: Slot -->
      <g filter="url(#sh_s4)">
        <rect x="95" y="210" width="140" height="56" rx="6" fill="#fff" stroke="#e5e5ea"/>
        <text x="165" y="228" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="7" font-weight="700" fill="#aaa" letter-spacing=".04em">SLOT (STEP 5)</text>
