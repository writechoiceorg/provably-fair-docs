        <text x="562" y="92" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11.5" font-weight="700" fill="#16a34a">Payout Calculation</text>
        <text x="562" y="108" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#16a34a">amount × multiplier</text>
        <text x="562" y="120" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#aaa">$0.01 × 10.08454259</text>
        <!-- Result pill (green) -->
        <rect x="493" y="130" width="138" height="16" rx="8" fill="#16a34a"/>
        <text x="562" y="142" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" fill="#fff">win = $0.10085</text>
      </g>


      <!-- ══════════════════════════════════════════════ -->
      <!-- REAL BET EXAMPLE — centered at 360             -->
      <!-- ══════════════════════════════════════════════ -->

      <rect x="65" y="174" width="590" height="108" rx="10" fill="#fff" stroke="#e5e5ea"/>
      <rect x="65" y="174" width="590" height="108" rx="10" fill="url(#dots_s4)"/>
      <!-- Orange top accent -->
