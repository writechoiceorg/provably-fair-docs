<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 210" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&amp;family=DM+Sans:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap');
  </style>
      <defs>
        <filter id="sh_s1" x="-4%" y="-8%" width="108%" height="124%">
          <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#000" flood-opacity=".07"/>
        </filter>
        <pattern id="dots_s1" width="6" height="6" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r=".3" fill="#000" opacity=".02"/>
        </pattern>
      </defs>
      <rect width="720" height="210" fill="#f6f7f9"/>

      <!-- Title -->
      <text x="360" y="24" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="10" font-weight="700" fill="#aaa" letter-spacing=".08em">COMMIT-REVEAL FLOW</text>

      <!-- Container -->
      <rect x="20" y="38" width="680" height="158" rx="10" fill="#fff" stroke="#e5e5ea"/>
      <rect x="20" y="38" width="680" height="158" rx="10" fill="url(#dots_s1)"/>
      <rect x="20" y="38" width="680" height="3" rx="1.5" fill="#e8590c" opacity=".5"/>


      <!-- ── STEP 1: COMMIT ── -->
      <text x="110" y="62" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="8.5" font-weight="700" fill="#e8590c" letter-spacing=".08em" opacity=".7">COMMIT</text>

      <!-- down arrow from label -->
      <line x1="110" y1="68" x2="110" y2="80" stroke="#d4d4da" stroke-width="1.3"/>
      <polygon points="106,78 110,86 114,78" fill="#d4d4da"/>

      <g filter="url(#sh_s1)">
        <rect x="50" y="88" width="120" height="90" rx="8" fill="#fff" stroke="#e5e5ea"/>
        <text x="110" y="122" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="#2a2a2e">Hash</text>
        <text x="110" y="138" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="#2a2a2e">shown to</text>
        <text x="110" y="154" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="#2a2a2e">player</text>
      </g>

      <!-- arrow → -->
      <line x1="174" y1="133" x2="206" y2="133" stroke="#d4d4da" stroke-width="1.3"/>
      <polygon points="204,129.5 210,133 204,136.5" fill="#d4d4da"/>


      <!-- ── STEP 2: BET ── -->
      <text x="280" y="62" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="8.5" font-weight="700" fill="#e8590c" letter-spacing=".08em" opacity=".7">BET</text>

      <line x1="280" y1="68" x2="280" y2="80" stroke="#d4d4da" stroke-width="1.3"/>
      <polygon points="276,78 280,86 284,78" fill="#d4d4da"/>

      <g filter="url(#sh_s1)">
        <rect x="220" y="88" width="120" height="90" rx="8" fill="#fff" stroke="#e5e5ea"/>
        <text x="280" y="122" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="#2a2a2e">Player bets</text>
        <text x="280" y="138" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="#2a2a2e">with client</text>
        <text x="280" y="154" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="#2a2a2e">seed</text>
      </g>

      <!-- arrow → -->
      <line x1="344" y1="133" x2="376" y2="133" stroke="#d4d4da" stroke-width="1.3"/>
      <polygon points="374,129.5 380,133 374,136.5" fill="#d4d4da"/>


      <!-- ── STEP 3: REVEAL ── -->
      <text x="450" y="62" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="8.5" font-weight="700" fill="#e8590c" letter-spacing=".08em" opacity=".7">REVEAL</text>

      <line x1="450" y1="68" x2="450" y2="80" stroke="#d4d4da" stroke-width="1.3"/>
      <polygon points="446,78 450,86 454,78" fill="#d4d4da"/>

      <g filter="url(#sh_s1)">
        <rect x="390" y="88" width="120" height="90" rx="8" fill="#fff" stroke="#e5e5ea"/>
        <text x="450" y="122" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="#2a2a2e">Server seed</text>
        <text x="450" y="138" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="600" fill="#2a2a2e">revealed</text>
      </g>

      <!-- arrow → -->
      <line x1="514" y1="133" x2="546" y2="133" stroke="#d4d4da" stroke-width="1.3"/>
      <polygon points="544,129.5 550,133 544,136.5" fill="#d4d4da"/>


      <!-- ── STEP 4: VERIFY ── -->
      <text x="620" y="62" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="8.5" font-weight="700" fill="#16a34a" letter-spacing=".08em" opacity=".7">VERIFY</text>

      <line x1="620" y1="68" x2="620" y2="80" stroke="#bbf7d0" stroke-width="1.3"/>
      <polygon points="616,78 620,86 624,78" fill="#bbf7d0"/>

      <g filter="url(#sh_s1)">
        <rect x="560" y="88" width="120" height="90" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
        <text x="620" y="118" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10.5" font-weight="600" fill="#16a34a">SHA-256</text>
        <text x="620" y="138" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10.5" font-weight="600" fill="#16a34a">(seed)</text>
        <text x="620" y="158" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10.5" font-weight="600" fill="#16a34a">= hash?</text>
      </g>

</svg>
