<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 760 180" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&amp;family=DM+Sans:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap');
  </style>
      <defs>
        <filter id="sh_s1" x="-4%" y="-6%" width="108%" height="120%">
          <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#000" flood-opacity=".06"/>
        </filter>
      </defs>
      <rect width="760" height="180" fill="#f6f7f9"/>

      <!-- Title -->
      <text x="380" y="24" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="10" font-weight="700" fill="#aaa" letter-spacing=".08em">PROVABLY FAIR PLINKO GENERATION</text>

      <!-- Server Seed -->
      <g filter="url(#sh_s1)">
        <rect x="22" y="42" width="138" height="60" rx="8" fill="#fff" stroke="#e5e5ea" stroke-width="1"/>
        <!-- lock icon - amber -->
        <svg x="34" y="52" width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="#d97706" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7.5" width="12" height="7" rx="2"/>
          <path d="M4.5,7.5 V5 A3.5,3.5 0 0 1 11.5,5 V7.5"/>
        </svg>
        <text x="53" y="65" font-family="DM Sans,sans-serif" font-size="12" font-weight="700" fill="#2a2a2e">Server Seed</text>
        <text x="36" y="85" font-family="DM Sans,sans-serif" font-size="10" fill="#aaa">Casino-committed</text>
      </g>

      <!-- Client Seed -->
      <g filter="url(#sh_s1)">
        <rect x="176" y="42" width="138" height="60" rx="8" fill="#fff" stroke="#e5e5ea" stroke-width="1"/>
        <!-- user icon - blue -->
        <svg x="188" y="51" width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="#2563eb" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="5" r="3.2"/>
          <path d="M2,15 A6,4.5 0 0 1 14,15"/>
        </svg>
        <text x="207" y="65" font-family="DM Sans,sans-serif" font-size="12" font-weight="700" fill="#2a2a2e">Client Seed</text>
        <text x="190" y="85" font-family="DM Sans,sans-serif" font-size="10" fill="#aaa">Player-controlled</text>
      </g>

      <!-- Nonce:Row -->
      <g filter="url(#sh_s1)">
        <rect x="330" y="42" width="122" height="60" rx="8" fill="#fff" stroke="#e5e5ea" stroke-width="1"/>
        <!-- hash icon - slate -->
        <svg x="342" y="52" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#64748b" stroke-width="1.6" stroke-linecap="round">
          <line x1="3" y1="0.5" x2="1.5" y2="13.5"/>
          <line x1="9" y1="0.5" x2="7.5" y2="13.5"/>
          <line x1="0" y1="4.5" x2="12" y2="4.5"/>
          <line x1="2" y1="9.5" x2="14" y2="9.5"/>
        </svg>
        <text x="360" y="65" font-family="DM Sans,sans-serif" font-size="12" font-weight="700" fill="#2a2a2e">Nonce:Row</text>
        <text x="344" y="85" font-family="DM Sans,sans-serif" font-size="10" fill="#aaa">Per-row cursor</text>
      </g>

      <!-- Connector lines down to rail -->
      <line x1="91" y1="102" x2="91" y2="118" stroke="#e5e5ea" stroke-width="1.5"/>
      <line x1="245" y1="102" x2="245" y2="118" stroke="#e5e5ea" stroke-width="1.5"/>
      <line x1="391" y1="102" x2="391" y2="118" stroke="#e5e5ea" stroke-width="1.5"/>
      <!-- Horizontal rail -->
      <line x1="91" y1="118" x2="510" y2="118" stroke="#e5e5ea" stroke-width="1.5"/>
      <!-- Rail up into HMAC -->
      <line x1="510" y1="118" x2="510" y2="102" stroke="#e5e5ea" stroke-width="1.5"/>

      <!-- HMAC-SHA256 (dark box) -->
      <g filter="url(#sh_s1)">
        <rect x="468" y="42" width="164" height="60" rx="8" fill="#0e0e14"/>
        <text x="494" y="64" font-family="JetBrains Mono,monospace" font-size="11.5" font-weight="600" fill="rgba(255,255,255,.88)">HMAC-SHA256</text>
        <text x="494" y="84" font-family="DM Sans,sans-serif" font-size="10" fill="rgba(255,255,255,.35)">mod 2 → L or R per row</text>
      </g>

      <!-- Arrow to result -->
      <line x1="632" y1="72" x2="660" y2="72" stroke="#e5e5ea" stroke-width="1.5"/>
      <polygon points="658,67 668,72 658,77" fill="#e5e5ea"/>

      <!-- Plinko result (green box) -->
      <g filter="url(#sh_s1)">
        <rect x="672" y="52" width="56" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
        <!-- triangle dot grid -->
        <svg x="685" y="56" width="30" height="32" viewBox="0 0 30 32" fill="none">
          <!-- row 1: 1 dot -->
          <circle cx="15" cy="5" r="2" fill="#22c55e"/>
          <!-- row 2: 2 dots -->
          <circle cx="11" cy="12" r="2" fill="#16a34a" opacity=".6"/>
          <circle cx="19" cy="12" r="2" fill="#16a34a" opacity=".6"/>
          <!-- row 3: 3 dots -->
          <circle cx="7" cy="19" r="2" fill="#16a34a" opacity=".4"/>
          <circle cx="15" cy="19" r="2" fill="#16a34a" opacity=".4"/>
          <circle cx="23" cy="19" r="2" fill="#16a34a" opacity=".4"/>
          <!-- row 4: 4 dots -->
          <circle cx="3" cy="26" r="2" fill="#16a34a" opacity=".25"/>
          <circle cx="11" cy="26" r="2" fill="#16a34a" opacity=".25"/>
          <circle cx="19" cy="26" r="2" fill="#16a34a" opacity=".25"/>
          <circle cx="27" cy="26" r="2" fill="#16a34a" opacity=".25"/>
        </svg>
      </g>

      <!-- Bottom label -->
      <text x="380" y="156" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="#aaa">Same inputs → same ball path. Every row verifiable.</text>

</svg>
