<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 310" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&amp;family=DM+Sans:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap');
  </style>
      <defs>
        <filter id="sh_s1" x="-4%" y="-6%" width="108%" height="120%">
          <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#000" flood-opacity=".06"/>
        </filter>
        <pattern id="dots_s1" width="6" height="6" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r=".3" fill="#000" opacity=".02"/>
        </pattern>
      </defs>
      <rect width="720" height="310" fill="#f6f7f9"/>

      <!-- Title -->
      <text x="360" y="24" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="10" font-weight="700" fill="#aaa" letter-spacing=".08em">NONCE VALIDATION FLOW</text>


      <!-- ── 4 STEP BOXES ── -->

      <!-- Step 1: Nonce Init -->
      <text x="92" y="48" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="8" font-weight="700" fill="#e8590c" letter-spacing=".08em" opacity=".7">NONCE INIT</text>
      <line x1="92" y1="53" x2="92" y2="62" stroke="#d4d4da" stroke-width="1.2"/>
      <polygon points="88.5,60 92,67 95.5,60" fill="#d4d4da"/>

      <g filter="url(#sh_s1)">
        <rect x="30" y="70" width="124" height="68" rx="8" fill="#fff" stroke="#e5e5ea"/>
        <text x="92" y="96" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10.5" font-weight="600" fill="#2a2a2e">Nonce starts at 0</text>
        <text x="92" y="112" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10.5" font-weight="600" fill="#2a2a2e">for new server seed</text>
      </g>

      <!-- Arrow → -->
      <line x1="158" y1="104" x2="180" y2="104" stroke="#d4d4da" stroke-width="1.3"/>
      <polygon points="178,100.5 184,104 178,107.5" fill="#d4d4da"/>

      <!-- Step 2: Session Check -->
      <text x="252" y="48" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="8" font-weight="700" fill="#e8590c" letter-spacing=".08em" opacity=".7">SESSION CHECK</text>
      <line x1="252" y1="53" x2="252" y2="62" stroke="#d4d4da" stroke-width="1.2"/>
      <polygon points="248.5,60 252,67 255.5,60" fill="#d4d4da"/>

      <g filter="url(#sh_s1)">
        <rect x="190" y="70" width="124" height="68" rx="8" fill="#fff" stroke="#e5e5ea"/>
        <text x="252" y="92" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10.5" font-weight="600" fill="#2a2a2e">Verify same</text>
        <text x="252" y="106" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" font-weight="500" fill="#64748b">server_seed_hashed</text>
        <text x="252" y="120" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="#aaa">(same session)</text>
      </g>

      <!-- Arrow → -->
      <line x1="318" y1="104" x2="340" y2="104" stroke="#d4d4da" stroke-width="1.3"/>
      <polygon points="338,100.5 344,104 338,107.5" fill="#d4d4da"/>

      <!-- Step 3: Increment Check -->
      <text x="412" y="48" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="8" font-weight="700" fill="#e8590c" letter-spacing=".08em" opacity=".7">INCREMENT CHECK</text>
      <line x1="412" y1="53" x2="412" y2="62" stroke="#d4d4da" stroke-width="1.2"/>
      <polygon points="408.5,60 412,67 415.5,60" fill="#d4d4da"/>

      <g filter="url(#sh_s1)">
        <rect x="350" y="70" width="124" height="68" rx="8" fill="#fff" stroke="#e5e5ea"/>
        <text x="412" y="96" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10.5" font-weight="600" fill="#2a2a2e">Current nonce</text>
        <text x="412" y="112" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10.5" font-weight="600" fill="#2a2a2e">= previous + 1</text>
      </g>

      <!-- Arrow → -->
      <line x1="478" y1="104" x2="500" y2="104" stroke="#d4d4da" stroke-width="1.3"/>
      <polygon points="498,100.5 504,104 498,107.5" fill="#d4d4da"/>

      <!-- Step 4: Uniqueness -->
      <text x="572" y="48" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="8" font-weight="700" fill="#e8590c" letter-spacing=".08em" opacity=".7">UNIQUENESS</text>
      <line x1="572" y1="53" x2="572" y2="62" stroke="#d4d4da" stroke-width="1.2"/>
      <polygon points="568.5,60 572,67 575.5,60" fill="#d4d4da"/>

      <g filter="url(#sh_s1)">
        <rect x="510" y="70" width="124" height="68" rx="8" fill="#fff" stroke="#e5e5ea"/>
        <text x="572" y="96" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10.5" font-weight="600" fill="#2a2a2e">No nonce reused</text>
        <text x="572" y="112" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10.5" font-weight="600" fill="#2a2a2e">within session</text>
      </g>


      <!-- ── SEQUENCE EXAMPLE ── -->
      <rect x="30" y="156" width="604" height="52" rx="8" fill="#fff" stroke="#e5e5ea"/>
      <rect x="30" y="156" width="604" height="52" rx="8" fill="url(#dots_s1)"/>
      <text x="46" y="172" font-family="Plus Jakarta Sans,sans-serif" font-size="7.5" font-weight="700" fill="#aaa" letter-spacing=".08em">SEQUENCE EXAMPLE (SAME SESSION)</text>

      <!-- nonce boxes -->
      <rect x="120" y="180" width="72" height="20" rx="4" fill="#fff" stroke="#87ceeb" stroke-width="1"/>
      <text x="156" y="194" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9.5" font-weight="500" fill="#2a2a2e">nonce: 0</text>

      <text x="204" y="194" font-family="DM Sans,sans-serif" font-size="10" fill="#aaa">→</text>

      <rect x="220" y="180" width="72" height="20" rx="4" fill="#fff" stroke="#87ceeb" stroke-width="1"/>
      <text x="256" y="194" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9.5" font-weight="500" fill="#2a2a2e">nonce: 1</text>

      <text x="304" y="194" font-family="DM Sans,sans-serif" font-size="10" fill="#aaa">→</text>

      <rect x="320" y="180" width="72" height="20" rx="4" fill="#fff" stroke="#87ceeb" stroke-width="1"/>
      <text x="356" y="194" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9.5" font-weight="500" fill="#2a2a2e">nonce: 2</text>

      <text x="404" y="194" font-family="DM Sans,sans-serif" font-size="10" fill="#aaa">→</text>

      <rect x="420" y="180" width="72" height="20" rx="4" fill="#fff" stroke="#87ceeb" stroke-width="1"/>
      <text x="456" y="194" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9.5" font-weight="500" fill="#2a2a2e">nonce: 3</text>

      <text x="504" y="194" font-family="DM Sans,sans-serif" font-size="10" fill="#aaa">...</text>


      <!-- ── PASS BANNER ── -->
      <rect x="30" y="222" width="604" height="30" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
      <!-- check icon -->
      <svg x="42" y="228" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="0" y="0" width="16" height="16" rx="3" fill="#16a34a"/>
        <polyline points="4,8.5 7,11.5 12,5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <text x="64" y="242" font-family="Plus Jakarta Sans,sans-serif" font-size="8.5" font-weight="700" fill="#16a34a" letter-spacing=".04em">NONCE STARTS CORRECTLY, INCREMENTS BY 1, NEVER REUSED</text>


      <!-- ── WHY THIS MATTERS ── -->
      <rect x="30" y="264" width="604" height="34" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
      <!-- info icon -->
      <svg x="42" y="270" width="14" height="14" viewBox="0 0 16 16" fill="none">
        <rect x="0" y="0" width="16" height="16" rx="3" fill="#2563eb"/>
        <text x="8" y="12.5" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-size="11" font-weight="800" fill="#fff">i</text>
      </svg>
      <text x="62" y="278" font-family="Plus Jakarta Sans,sans-serif" font-size="7.5" font-weight="700" fill="#1e40af" letter-spacing=".02em">WHY THIS MATTERS</text>
      <text x="62" y="291" font-family="DM Sans,sans-serif" font-size="9" fill="#64748b" font-style="italic">Prevents replay attacks — same seeds + same nonce = same result. Sequential nonces ensure every bet is unique.</text>

</svg>
